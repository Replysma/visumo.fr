<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Editor Pro</title>
    <style>
        :root {
            --bg-editor: #f3f3f5;
            --bg-sidebar: #ffffff;
            --studio-black: #111111;
            --studio-green: #2ecc71;
            --text-gray: #8e8e93;
            --border-color: #e5e5e5;
            --squircle-radius: 18px;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-editor);
            overflow: hidden;
            display: flex;
        }

        /* --- SIDEBAR STYLE (Image 1 & 2) --- */
        .sidebar {
            width: 90px;
            height: 100vh;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            border-right: 1px solid var(--border-color);
            z-index: 100;
        }

        .logo-dot {
            width: 8px;
            height: 8px;
            background-color: var(--studio-green);
            border-radius: 50%;
            margin-bottom: 30px;
        }

        .tool-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            width: 100%;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }

        .icon-box {
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background-color: transparent;
        }

        .icon-box svg {
            stroke: #555;
            stroke-width: 2;
            fill: none;
            width: 22px;
        }

        /* Bouton "Ajouter" Style Studio Black */
        .btn-add .icon-box {
            background-color: var(--studio-black);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        .btn-add .icon-box svg {
            stroke: white;
        }

        .nav-item:hover .icon-box {
            background-color: #f0f0f2;
            transform: scale(1.1);
        }

        .btn-add:hover .icon-box {
            background-color: #000;
            transform: scale(1.1) rotate(90deg);
        }

        .nav-label {
            font-size: 10px;
            margin-top: 6px;
            color: var(--text-gray);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* --- TOOLBAR SECONDAIRE --- */
        .secondary-toolbar {
            position: absolute;
            left: 105px;
            top: 20px;
            background: white;
            padding: 10px;
            border-radius: 20px;
            display: flex;
            gap: 10px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            z-index: 90;
        }

        .shape-btn {
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: #f8f8f8;
            cursor: pointer;
            transition: 0.2s;
        }

        .shape-btn:hover {
            background: var(--studio-green);
            color: white;
        }

        /* --- ZONE DE TRAVAIL (CANVAS) --- */
        .canvas-container {
            flex-grow: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            overflow: hidden;
        }

        #artboard {
            width: 800px;
            height: 600px;
            background-color: white;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
            border-radius: 4px;
        }

        /* --- ÉLÉMENTS ÉDITABLES --- */
        .design-element {
            position: absolute;
            cursor: move;
            user-select: none;
            outline: 2px solid transparent;
            transition: outline 0.2s;
        }

        .design-element:hover {
            outline: 1px dashed var(--studio-green);
        }

        .design-element.selected {
            outline: 2px solid var(--studio-green);
        }

        .element-text {
            min-width: 50px;
            font-size: 24px;
            padding: 5px;
            white-space: nowrap;
        }

        .element-shape svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .element-image img {
            width: 100%;
            height: auto;
            pointer-events: none;
        }

        /* Bouton supprimer flottant */
        #delete-btn {
            position: absolute;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            display: none;
            z-index: 1000;
            font-weight: bold;
        }

        /* Halo d'import (Image 2) */
        .import-halo {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(46, 204, 113, 0.08) 0%, rgba(255, 255, 255, 0) 70%);
            pointer-events: none;
        }
    </style>
</head>

<body>

    <nav class="sidebar">
        <div class="logo-dot"></div>

        <div class="tool-group">
            <div class="nav-item btn-add" onclick="document.getElementById('file-input').click()">
                <div class="icon-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </div>
                <span class="nav-label">Import</span>
            </div>

            <div class="nav-item" onclick="addText()">
                <div class="icon-box">
                    <svg viewBox="0 0 24 24">
                        <path d="M4 7V4h16v3M9 20h6M12 4v16" />
                    </svg>
                </div>
                <span class="nav-label">Texte</span>
            </div>

            <div class="nav-item" onclick="toggleShapes()">
                <div class="icon-box">
                    <svg viewBox="0 0 24 24">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    </svg>
                </div>
                <span class="nav-label">Formes</span>
            </div>
        </div>

        <input type="file" id="file-input" style="display:none" accept="image/*" onchange="handleImage(this)">
    </nav>

    <div class="secondary-toolbar" id="shape-tools" style="display:none;">
        <button class="shape-btn" onclick="addShape('rect')">Carré</button>
        <button class="shape-btn" onclick="addShape('circle')">Rond</button>
        <button class="shape-btn" onclick="addShape('triangle')">Triangle</button>
        <button class="shape-btn" onclick="addShape('heart')">Cœur</button>
        <button class="shape-btn" onclick="addShape('rectangle')">Rectangle</button>
    </div>

    <main class="canvas-container">
        <div class="import-halo"></div>
        <div id="artboard">
        </div>
        <button id="delete-btn" onclick="deleteSelected()">×</button>
    </main>

    <script>
        const artboard = document.getElementById('artboard');
        const deleteBtn = document.getElementById('delete-btn');
        let selectedElement = null;

        // --- GESTION DES FORMES ---
        function toggleShapes() {
            const bar = document.getElementById('shape-tools');
            bar.style.display = bar.style.display === 'none' ? 'flex' : 'none';
        }

        function addShape(type) {
            const el = document.createElement('div');
            el.className = 'design-element element-shape';
            el.style.left = '50px';
            el.style.top = '50px';
            el.style.width = type === 'rectangle' ? '150px' : '100px';
            el.style.height = '100px';

            let svgContent = '';
            const color = varColor();

            if (type === 'rect' || type === 'rectangle') svgContent = `<svg><rect width="100%" height="100%" fill="${color}" rx="8"/></svg>`;
            else if (type === 'circle') svgContent = `<svg><circle cx="50%" cy="50%" r="48%" fill="${color}"/></svg>`;
            else if (type === 'triangle') svgContent = `<svg viewBox="0 0 100 100"><polygon points="50,5 95,95 5,95" fill="${color}"/></svg>`;
            else if (type === 'heart') svgContent = `<svg viewBox="0 0 32 32"><path fill="${color}" d="M16,28.261c0,0-14-7.941-14-17.047c0-9.106,14-9.106,14,0c0-9.106,14-9.106,14,0C30,20.32,16,28.261,16,28.261z"/></svg>`;

            el.innerHTML = svgContent;
            makeDraggable(el);
            artboard.appendChild(el);
        }

        // --- GESTION DU TEXTE ---
        function addText() {
            const el = document.createElement('div');
            el.className = 'design-element element-text';
            el.contentEditable = true;
            el.innerText = "Écrivez ici";
            el.style.left = '100px';
            el.style.top = '100px';
            el.style.color = varColor();
            makeDraggable(el);
            artboard.appendChild(el);
        }

        // --- GESTION DES IMAGES ---
        function handleImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const el = document.createElement('div');
                    el.className = 'design-element element-image';
                    el.style.width = '200px';
                    el.innerHTML = `<img src="${e.target.result}">`;
                    makeDraggable(el);
                    artboard.appendChild(el);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // --- MOTEUR DE DRAG & DROP ---
        function makeDraggable(el) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;

            el.onmousedown = function (e) {
                e.preventDefault();
                selectElement(el);
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            };

            function elementDrag(e) {
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                el.style.top = (el.offsetTop - pos2) + "px";
                el.style.left = (el.offsetLeft - pos1) + "px";
                updateDeleteBtn();
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

        // --- SELECTION & SUPPRESSION ---
        function selectElement(el) {
            if (selectedElement) selectedElement.classList.remove('selected');
            selectedElement = el;
            el.classList.add('selected');
            updateDeleteBtn();
        }

        function updateDeleteBtn() {
            if (selectedElement) {
                deleteBtn.style.display = 'block';
                deleteBtn.style.left = (selectedElement.offsetLeft + artboard.offsetLeft + selectedElement.offsetWidth) + 'px';
                deleteBtn.style.top = (selectedElement.offsetTop + artboard.offsetTop - 10) + 'px';
            }
        }

        function deleteSelected() {
            if (selectedElement) {
                selectedElement.remove();
                selectedElement = null;
                deleteBtn.style.display = 'none';
            }
        }

        function varColor() {
            const colors = ['#111111', '#2ecc71', '#3498db', '#e74c3c', '#f1c40f'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        // Déselectionner au clic sur le fond
        artboard.onclick = (e) => {
            if (e.target === artboard) {
                if (selectedElement) selectedElement.classList.remove('selected');
                selectedElement = null;
                deleteBtn.style.display = 'none';
            }
        };
    </script>
</body>

</html>
